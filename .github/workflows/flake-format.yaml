name: Flake format

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - run: nix fmt .
      - run: |
          if [[ $(git status --porcelain) ]]; then
            echo "Code formatting issues detected!"
            git diff
            exit 1
          else
            echo "No formatting issues found."
          fi
